<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ໃບບິນຮັບເງິນ - AOY TOPUP</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="receipt-page">
  <div class="receipt-container">
    <header class="receipt-header">
      <div class="receipt-icon-container" id="status-icon-container">
        <i class="fa-solid fa-spinner fa-spin receipt-icon" id="status-icon"></i>
      </div>
      <div class="receipt-title-block">
        <h2>ໃບບິນແຈ້ງຊຳລະເງິນ</h2>
        <div class="receipt-status-chip" id="status-chip">WAITING FOR PAYMENT</div>
      </div>
    </header>

    <!-- Info Grid -->
    <div id="display-info" class="receipt-info-grid">
      <!-- Populated via JS -->
    </div>
    
    <!-- Details List -->
    <div class="receipt-details-card">
      <div class="receipt-row">
        <span class="row-label">ລາຍການເຕີມເກມ:</span>
        <span class="row-value" id="disp-game-name">-</span>
      </div>
      <div class="receipt-row">
        <span class="row-label">ລາຍລະອຽດແພັກເກດ:</span>
        <span class="row-value cyan" id="disp-package-name">-</span>
      </div>
      <div class="receipt-row" id="receipt-original-price-row" style="display: none;">
        <span class="row-label">ລາຄາປົກກະຕິ:</span>
        <span class="row-value" id="disp-original-price">0 ກີບ</span>
      </div>
      <div class="receipt-row" id="receipt-discount-row" style="display: none;">
        <span class="row-label">ສ່ວນຫຼຸດ (10%):</span>
        <span class="row-value" id="disp-discount" style="color: #f43f5e; font-weight: 700;">0 ກີບ</span>
      </div>
      <div class="receipt-row">
        <span class="row-label">ຊ່ອງທາງການຈ່າຍ:</span>
        <span class="row-value" id="disp-payment-method">-</span>
      </div>
      <div class="receipt-row">
        <span class="row-label">ລາຄາທັງໝົດ:</span>
        <span class="row-value cyan" id="disp-total-price">0 ກີບ</span>
      </div>
    </div>

    <!-- Interactive QR Payment Section -->
    <div class="qr-payment-section" id="qr-section">
      <div class="qr-title" id="qr-section-title">
        <i class="fa-solid fa-qrcode"></i> ສະແກນ QR ເພື່ອຊຳລະເງິນ
      </div>
      <p class="qr-desc" id="qr-section-desc">
        ເປີດແອັບທະນາຄານຂອງທ່ານແລ້ວສະແກນ QR code ດ້ານລຸ່ມນີ້ເພື່ອໂອນເງິນເຂົ້າບັນຊີຮ້ານ
      </p>
      
      <div class="qr-wrapper">
        <div class="bcel-qr-mock"></div>
        <div class="bcel-qr-badge" id="qr-badge">BCEL One</div>
      </div>

      <div class="total-to-pay-qr" id="qr-total-text">0 ກีບ</div>
      
      <button class="simulate-payment-btn" id="btn-simulate" onclick="simulatePayment()">
        <i class="fa-solid fa-circle-check"></i> ຂ້ອຍໂອນເງິນແລ້ວ (ຈຳລອງການຈ່າຍ)
      </button>
    </div>

    <!-- Decorative Barcode -->
    <div class="receipt-barcode">
      <div class="barcode-lines"></div>
      <span class="barcode-text" id="barcode-id">TXN-000000</span>
    </div>

    <!-- Actions -->
    <div class="receipt-actions">
      <button class="btn btn-print" onclick="window.print()">
        <i class="fa-solid fa-print"></i> ພິມໃບບິນ
      </button>
      <button class="btn btn-save" onclick="saveAsPDF()">
        <i class="fa-solid fa-file-pdf"></i> ບັນທຶກ PDF
      </button>
      <button class="btn btn-back btn-wide" onclick="location.href='index.html'">
        <i class="fa-solid fa-arrow-left"></i> ກັບຄືນໜ້າຫຼັກ
      </button>
    </div>
  </div>

  <script>
    const orderData = JSON.parse(localStorage.getItem('myOrder'));

    if (orderData) {
      // Set values
      document.getElementById('disp-game-name').innerText = orderData.gameName;
      document.getElementById('disp-package-name').innerText = orderData.packageName;
      document.getElementById('disp-total-price').innerText = orderData.price.toLocaleString() + " ກີບ";
      document.getElementById('qr-total-text').innerText = orderData.price.toLocaleString() + " ກີບ";
      document.getElementById('barcode-id').innerText = orderData.orderId;

      if (orderData.discount && orderData.discount > 0) {
        document.getElementById('receipt-original-price-row').style.display = 'flex';
        document.getElementById('receipt-discount-row').style.display = 'flex';
        document.getElementById('disp-original-price').innerText = orderData.originalPrice.toLocaleString() + " ກີບ";
        document.getElementById('disp-discount').innerText = "-" + orderData.discount.toLocaleString() + " ກີບ";
      } else {
        document.getElementById('receipt-original-price-row').style.display = 'none';
        document.getElementById('receipt-discount-row').style.display = 'none';
      }

      let payName = "BCELOne QR Pay";
      let badgeText = "BCEL One";
      let logoBg = "#0056b3";

      if (orderData.paymentMethod === "umoney") {
        payName = "U-Money (Unitel)";
        badgeText = "u-money";
        logoBg = "#f7941d";
      } else if (orderData.paymentMethod === "ldb") {
        payName = "LDB Trust";
        badgeText = "LDB Trust";
        logoBg = "#116834";
      }

      document.getElementById('disp-payment-method').innerText = payName;
      
      const badge = document.getElementById('qr-badge');
      badge.innerText = badgeText;
      badge.style.backgroundColor = logoBg;

      document.getElementById('display-info').innerHTML = `
        <div class="info-card">
          <i class="fa-solid fa-calendar-alt"></i>
          <div>
            <span class="info-label">ວັນທີ/ເວລາ</span>
            <span class="info-value">${orderData.date}</span>
          </div>
        </div>
        <div class="info-card">
          <i class="fa-solid fa-gamepad"></i>
          <div>
            <span class="info-label">ID ຜູ້ຫຼິ້ນ (UID)</span>
            <span class="info-value" style="color: #0ea5e9;">${orderData.playerId}</span>
          </div>
        </div>
        ${orderData.server ? `
        <div class="info-card">
          <i class="fa-solid fa-server"></i>
          <div>
            <span class="info-label">ເຊີບເວີ</span>
            <span class="info-value">${orderData.server}</span>
          </div>
        </div>
        ` : ''}
        <div class="info-card">
          <i class="fa-solid fa-phone"></i>
          <div>
            <span class="info-label">ເບີໂທຕິດຕໍ່</span>
            <span class="info-value">${orderData.phone}</span>
          </div>
        </div>
      `;
    } else {
      document.querySelector('.receipt-container').innerHTML = `
        <div style="text-align: center; padding: 40px 20px;">
          <i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; color: #f43f5e; margin-bottom: 16px;"></i>
          <h2>ບໍ່ພົບຂໍ້ມູນການເຕີມເງິນ</h2>
          <p style="color: #94a3b8; margin: 12px 0 24px;">ກະລຸນາກັບຄືນໄປເຮັດລາຍການຢູ່ໜ້າຫຼັກ</p>
          <button class="btn btn-back" onclick="location.href='index.html'" style="margin: 0 auto; width: 200px;">
            <i class="fa-solid fa-arrow-left"></i> ກັບຄືนໜ້າຫຼັກ
          </button>
        </div>
      `;
    }

    function simulatePayment() {
      // 1. Change layout to COMPLETED
      const statusIconContainer = document.getElementById('status-icon-container');
      statusIconContainer.classList.add('completed');
      
      const statusIcon = document.getElementById('status-icon');
      statusIcon.className = "fa-solid fa-circle-check receipt-icon"; // remove fa-spin and change icon

      const statusChip = document.getElementById('status-chip');
      statusChip.innerText = "SUCCESS";
      statusChip.classList.add('completed');

      // 2. Change QR section to Success status
      const qrSection = document.getElementById('qr-section');
      qrSection.classList.add('completed');
      
      document.getElementById('qr-section-title').innerHTML = `<i class="fa-solid fa-circle-check" style="color: #10b981;"></i> ຊຳລະເງິນສຳເລັດແລ້ວ`;
      document.getElementById('qr-section-desc').innerHTML = `ລະບົບໄດ້ຮັບເງິນຂອງທ່ານແລ້ວ! ແລະ ກຳລັງດຳເນີນການເຕີມ <strong>${orderData.packageName}</strong> ເຂົ້າບັນຊີ ID <strong>${orderData.playerId}</strong>.`;
      
      // Hide QR code wrapper & price & simulate button
      document.querySelector('.qr-wrapper').style.display = "none";
      document.getElementById('qr-total-text').style.display = "none";
      document.getElementById('btn-simulate').style.display = "none";

      // 3. Update localStorage history status
      if (orderData) {
        let history = JSON.parse(localStorage.getItem('purchasedKeysHistory') || '[]');
        const idx = history.findIndex(h => h.orderId === orderData.orderId);
        if (idx !== -1) {
          history[idx].status = 'SUCCESS';
          localStorage.setItem('purchasedKeysHistory', JSON.stringify(history));
        }
        
        // Also update order status
        orderData.status = 'SUCCESS';
        localStorage.setItem('myOrder', JSON.stringify(orderData));
      }
    }

    function saveAsPDF() {
      window.print();
    }
  </script>
</body>
</html>
